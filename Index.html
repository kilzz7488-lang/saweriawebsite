<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SAWERIA KILZZ • QRIS</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px
        }
        .container{
            max-width:500px;
            width:100%;
            background:white;
            border-radius:60px;
            padding:40px 30px;
            box-shadow:0 30px 60px rgba(0,0,0,0.3)
        }
        h1{
            text-align:center;
            color:#2d3748;
            font-size:3.5rem;
            margin-bottom:5px;
            font-weight:800
        }
        .sub{
            text-align:center;
            color:#718096;
            font-size:1.3rem;
            margin-bottom:25px;
            border-bottom:2px solid #e2e8f0;
            padding-bottom:15px
        }
        .qris-box{
            background:#f7fafc;
            border:3px solid #4299e1;
            border-radius:40px;
            padding:30px;
            margin:25px 0;
            text-align:center
        }
        .qris-image{
            max-width:250px;
            margin:0 auto;
            border-radius:30px;
            overflow:hidden;
            border:4px solid #4299e1;
            box-shadow:0 10px 30px rgba(66,153,225,0.5)
        }
        .qris-image img{
            width:100%;
            height:auto;
            display:block
        }
        .qris-title{
            font-size:1.8rem;
            font-weight:bold;
            color:#2d3748;
            margin:20px 0 10px
        }
        .qris-subtitle{
            color:#718096;
            font-size:1rem;
            margin-bottom:15px
        }
        .info-box{
            background:#edf2f7;
            border-radius:30px;
            padding:20px;
            margin:20px 0
        }
        .info-row{
            display:flex;
            justify-content:space-between;
            padding:12px 0;
            border-bottom:1px dashed #cbd5e0
        }
        .info-row:last-child{
            border-bottom:none
        }
        .info-label{
            color:#4a5568;
            font-weight:600
        }
        .info-value{
            color:#2b6cb0;
            font-weight:700;
            font-size:1.2rem
        }
        .nmdi-box{
            background:#4299e1;
            border-radius:20px;
            padding:15px;
            margin:20px 0;
            text-align:center;
            color:white
        }
        .nmdi-box .nmdi{
            font-size:1.8rem;
            font-weight:900;
            letter-spacing:2px;
            word-break:break-all
        }
        .nmdi-box .label{
            font-size:0.9rem;
            opacity:0.9
        }
        .footer-text{
            text-align:center;
            color:#a0aec0;
            font-size:0.8rem;
            margin-top:25px
        }
        .footer-text a{
            color:#4299e1;
            text-decoration:none
        }
        .button-sawer{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:60px;
            font-size:1.3rem;
            font-weight:bold;
            width:100%;
            cursor:pointer;
            margin:20px 0;
            transition:0.2s
        }
        .button-sawer:hover{
            transform:scale(1.02);
            box-shadow:0 10px 30px rgba(102,126,234,0.5)
        }
        .qr-note{
            background:#fefcbf;
            border:2px solid #ecc94b;
            border-radius:20px;
            padding:10px;
            color:#744210;
            font-size:0.9rem;
            margin:15px 0
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KILZZ</h1>
        <div class="sub">✨ SAWERIA ✨</div>
        
        <!-- QRIS IMAGE (QR.jpg) -->
        <div class="qris-box">
            <div class="qris-image">
                <img src="QR.jpg" alt="QRIS KILZZ" onerror="this.src='https://placehold.co/500x500/4299e1/white?text=QRIS+KILZZ'">
            </div>
            <div class="qris-title">QRIS KILZZ</div>
            <div class="qris-subtitle">Scan untuk sawer</div>
        </div>
        
        <!-- NMDI INFO -->
        <div class="nmdi-box">
            <div class="label">NMDI :</div>
            <div class="nmdi">ID2022228753010</div>
            <div style="margin-top:10px;">A01</div>
        </div>
        
        <!-- INFO DETAIL -->
        <div class="info-box">
            <div class="info-row">
                <span class="info-label">Nama</span>
                <span class="info-value">KILZZ</span>
            </div>
            <div class="info-row">
                <span class="info-label">Bank/E-Wallet</span>
                <span class="info-value">QRIS Standar</span>
            </div>
            <div class="info-row">
                <span class="info-label">Min. Sawer</span>
                <span class="info-value">Rp 1.000</span>
            </div>
            <div class="info-row">
                <span class="info-label">Pembayaran</span>
                <span class="info-value">Nasional</span>
            </div>
        </div>
        
        <!-- QRIS NOTE -->
        <div class="qr-note">
            <strong>SATU QRIS UNTUK SEMUA</strong><br>
            Cek aplikasi penyelenggara di: <strong>www.aspi-qris.id</strong>
        </div>
        
        <!-- TOMBOL SAWER (hiasan) -->
        <button class="button-sawer" onclick="sawerDulu()">💰 SAWER SEKARANG</button>
        
        <!-- FOOTER -->
        <div class="footer-text">
            KILZZ • QRIS Standar Pembayaran Nasional • 2025<br>
            <a href="#" onclick="copyNMDI()">📋 Copy NMDI</a> | <a href="#" onclick="cekQRIS()">🔍 Cek QRIS</a>
        </div>
    </div>

    <script>
        function sawerDulu() {
            alert('Scan QRIS di atas untuk sawer! Terima kasih supportnya 🙏');
        }
        
        function copyNMDI() {
            let nmdi = 'ID2022228753010';
            navigator.clipboard.writeText(nmdi).then(() => {
                alert('NMDI berhasil di-copy: ' + nmdi);
            }).catch(() => {
                alert('NMDI: ' + nmdi);
            });
        }
        
        function cekQRIS() {
            window.open('https://www.aspi-qris.id', '_blank');
        }
        
        // Cek apakah gambar QR.jpg ada
        window.onload = function() {
            let img = document.querySelector('.qris-image img');
            if(img.complete && img.naturalHeight === 0) {
                console.log('Gambar QR.jpg tidak ditemukan, pakai placeholder');
            }
        }
    </script>
</body>
  </html>
